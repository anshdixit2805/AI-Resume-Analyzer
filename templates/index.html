<!DOCTYPE html>
<html>
<head>
    <title>AI Resume Analyzer</title>
    <style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    color: white;
    text-align: center;

    background: #0f172a;

    min-height: 100vh;       /* full screen */
    display: flex;
    flex-direction: column;
    align-items: center;
}
body::before {
    content: "";
    position: fixed;
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, #3b82f6, transparent);
    top: -100px;
    left: -100px;
    opacity: 0.3;
    filter: blur(100px);
}

body::after {
    content: "";
    position: fixed;
    width: 500px;
    height: 500px;
    background: radial-gradient(circle, #9333ea, transparent);
    bottom: -100px;
    right: -100px;
    opacity: 0.3;
    filter: blur(100px);
}

/* 🔥 Animated Gradient */
@keyframes gradientBG {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

/* 🫧 Bubbles */
.floating-icons span {
    position: absolute;
    bottom: -50px;
    font-size: 30px;
    animation: floatUp 10s infinite ease-in;
    opacity: 0.7;
}

/* Different positions + speeds */
.floating-icons span:nth-child(1) { left: 10%; animation-duration: 8s; }
.floating-icons span:nth-child(2) { left: 30%; animation-duration: 12s; }
.floating-icons span:nth-child(3) { left: 50%; animation-duration: 10s; }
.floating-icons span:nth-child(4) { left: 70%; animation-duration: 14s; }
.floating-icons span:nth-child(5) { left: 90%; animation-duration: 9s; }

@keyframes floatUp {
    0% {
        transform: translateY(0);
        opacity: 1;
    }
    100% {
        transform: translateY(-900px);
        opacity: 0;
    }
}

/* Layer fix */
.floating-icons {
    position: fixed;
    width: 100%;
    height: 100%;
    top: 0;
    left: 0;

    pointer-events: none; /* important */
    z-index: 1;
}

.container {
    margin-top: 40px;
    background: rgba(255, 255, 255, 0.08);
    backdrop-filter: blur(12px);
    padding: 30px;

    width: 90%;          /* responsive */
    max-width: 600px;   /* prevents over-stretch */

    border-radius: 20px;
    box-shadow: 0 0 40px rgba(0,0,0,0.5);

    position: relative;
    z-index: 2;
}

/* ✨ Inputs */
textarea {
    width: 90%;
    height: 150px;
    padding: 10px;
    border-radius: 10px;
    border: none;
    outline: none;
}

/* 🔥 Button */
button {
    padding: 12px 25px;
    margin-top: 10px;
    background: linear-gradient(45deg, #ff6a00, #ee0979);
    color: white;
    border: none;
    border-radius: 25px;
    cursor: pointer;
    font-size: 16px;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.1);
    box-shadow: 0 0 15px #ff6a00;
}

/* 📦 Lists */
ul {
    list-style: none;
    padding: 0;
}

li {
    background: rgba(255,255,255,0.2);
    margin: 5px;
    padding: 10px;
    border-radius: 8px;
}

/* 🔗 Link button */
a {
    display: inline-block;
    margin-top: 20px;
    text-decoration: none;
    color: white;
    background: #ff6a00;
    padding: 10px 20px;
    border-radius: 20px;
}
h1 {
    margin-top: 30px;
}

.container h3 {
    margin-top: 20px;
}
.progress-bar {
    width: 100%;
}
</style>
</head>
<body>
<body>

    <div class="floating-icons">
    <span>💸</span>
    <span>💼</span>
    <span>🧠</span>
    <span>📊</span>
    <span>💰</span>
</div>

    <h1>🚀 AI Resume Analyzer</h1>
<p>Smart Resume Screening using IBM Watson</p>

    <!-- IMAGE -->
    <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" width="80">

    <div class="container">
        <h2>Paste Your Resume</h2>
        <form method="POST">
            <label for="role">Select Job Role:</label>
            <select name="role" required>
            <option value="data_scientist">Data Scientist</option>
            <option value="web_developer">Web Developer</option>
            <option value="ai_engineer">AI Engineer</option>
        </select>
        
            <textarea name="resume" placeholder="Paste your resume here..."></textarea><br><br>
            
            <button type="submit">Analyze Resume</button>
        </form>
    </div>

</body>
</html>
